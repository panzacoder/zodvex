name: Release

on:
  push:
    tags:
      - 'v*'
    # Release-branch fallback for environments whose git credential can push
    # branches but not tags AND can't call the workflow_dispatch API (e.g. the
    # remote sandbox's GitHub App). Pushing `release/vX.Y.Z` triggers the same
    # pipeline: the tag is derived from the branch name, verified against
    # package.json, created via GITHUB_TOKEN, and the branch is deleted after
    # a successful publish.
    branches:
      - 'release/v*'
  # Manual fallback for environments that can't push tags (e.g. remote/CI
  # sandboxes whose git credential is branch-only). The workflow verifies the
  # requested tag against package.json, creates the tag on the dispatched ref,
  # then publishes exactly as the tag-push path would.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create and publish (e.g. v0.7.7-beta.1). Must be v + the version in packages/zodvex/package.json.'
        required: true
        type: string

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type check
        run: bun run type-check

      - name: Run tests
        run: bun run test

      - name: Run lint
        run: bun run lint

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: release-tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$INPUT_TAG"
          elif [[ "$GITHUB_REF" == refs/heads/release/* ]]; then
            TAG="${GITHUB_REF#refs/heads/release/}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ "$TAG" != v* ]]; then
            echo "ERROR: tag '$TAG' must start with 'v'." >&2
            exit 1
          fi
          PKG_VERSION=$(node -p "require('./packages/zodvex/package.json').version")
          if [[ "$TAG" != "v$PKG_VERSION" ]]; then
            echo "ERROR: tag '$TAG' does not match package.json version '$PKG_VERSION'." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release tag (dispatch / release-branch paths)
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/release/')
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha,
              });
              core.info(`Created tag ${tag} at ${context.sha}`);
            } catch (e) {
              if (`${e}`.includes('already exists')) {
                const existing = await github.rest.git.getRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${tag}`,
                });
                if (existing.data.object.sha !== context.sha) {
                  core.setFailed(`Tag ${tag} already exists at ${existing.data.object.sha}, not ${context.sha}. Delete it or pick a new version.`);
                } else {
                  core.info(`Tag ${tag} already exists at this commit — continuing.`);
                }
              } else {
                throw e;
              }
            }

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Copy root files for publish
        run: cp README.md LICENSE packages/zodvex/

      - name: Determine npm dist-tag
        id: dist-tag
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          TAG="${RELEASE_TAG#v}"
          if [[ "$TAG" == *-beta* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *-alpha* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *-rc* ]]; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        env:
          DIST_TAG: ${{ steps.dist-tag.outputs.tag }}
        run: |
          cd packages/zodvex
          npm publish --access public --provenance --tag "$DIST_TAG"

      # Stable releases get a GitHub Release entry; prereleases don't. The
      # body is docs/releases/<tag>.md when the repo carries one, and GitHub's
      # auto-generated notes (PR list since the previous tag) are appended
      # either way. Idempotent: an existing release is left untouched.
      - name: Create GitHub Release (stable only)
        if: steps.dist-tag.outputs.tag == 'latest'
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        with:
          script: |
            const fs = require('fs');
            const tag = process.env.RELEASE_TAG;
            const notesPath = `docs/releases/${tag}.md`;
            const body = fs.existsSync(notesPath) ? fs.readFileSync(notesPath, 'utf8') : undefined;
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                body,
                generate_release_notes: true,
              });
              core.info(`Created GitHub Release ${tag}`);
            } catch (e) {
              if (`${e}`.includes('already_exists')) {
                core.info(`Release ${tag} already exists — skipping.`);
              } else {
                throw e;
              }
            }

      - name: Delete release branch (release-branch path)
        if: startsWith(github.ref, 'refs/heads/release/')
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref.replace('refs/', ''),
            });
            core.info(`Deleted ${context.ref} after successful publish.`);
