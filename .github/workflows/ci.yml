name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type check
        run: bun run type-check

      - name: Run example type checks
        run: bun run type-check:examples

      - name: Run tests
        run: bun run test

      - name: Run build
        run: bun run build

      - name: Verify example app codegen is up to date
        run: |
          bun install
          bun run --cwd examples/task-manager generate
          git diff --exit-code examples/task-manager/convex/_zodvex/ || {
            echo ""
            echo "ERROR: Generated files are stale. Run 'cd examples/task-manager && bun x zodvex generate' and commit the result."
            exit 1
          }

      - name: Setup Node for CLI smoke test
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: CLI smoke test under Node (issue #89)
        run: |
          # The published bin must run on Bun-less machines: node shebang,
          # no Bun-only APIs, and discovery (loader hooks + extensionless
          # TS imports) must produce identical output to the Bun run above.
          node packages/zodvex/dist/cli/index.js --help > /dev/null
          node packages/zodvex/dist/cli/index.js generate examples/task-manager/convex
          git diff --exit-code examples/task-manager/convex/_zodvex/ || {
            echo ""
            echo "ERROR: 'zodvex generate' under Node produced different output than under Bun."
            exit 1
          }
          # tsconfig path aliases must resolve under Node (#99)
          node packages/zodvex/dist/cli/index.js generate test-fixtures/alias-smoke/convex
          # and any failed module import must fail the generate rather than
          # silently emitting a partial registry (#99), leaving any existing
          # registry untouched instead of clobbering it with the stub (#104)
          mkdir -p test-fixtures/broken-import-smoke/convex/_zodvex
          echo "// sentinel registry" > test-fixtures/broken-import-smoke/convex/_zodvex/api.js
          if node packages/zodvex/dist/cli/index.js generate test-fixtures/broken-import-smoke/convex; then
            echo ""
            echo "ERROR: 'zodvex generate' succeeded despite a failed module import."
            exit 1
          fi
          grep -q "sentinel registry" test-fixtures/broken-import-smoke/convex/_zodvex/api.js || {
            echo ""
            echo "ERROR: failed generate clobbered the existing registry (#104)."
            exit 1
          }


  lint:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint
